name: Update Blog Index

on:
  schedule:
    # Run daily at 6:00 AM UTC (2:00 PM Beijing time)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Run blog index generator
        run: |
          python3 scripts/generate_blog_index.py
          
      - name: Commit and push changes
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-update blog index $(date +'%Y-%m-%d')"
          git push
