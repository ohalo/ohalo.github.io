# Jekyll 配置
title: halo的技术博客
description: AI工具 · 创业思考 · 技术实践
url: https://blog.halo26812.eu.org
author: halo

# 使用 GitHub Pages 兼容的主题
theme: null

# 插件
plugins:
  - jekyll-seo-tag

# 默认值
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

# 排除文件
exclude:
  - README.md
  - CNAME
  - params.json
  - giscus.json

# 文章永久链接
permalink: /posts/:categories/:title.html

# Markdown 配置 - 允许 HTML 渲染
markdown: kramdown
kramdown:
  parse_block_html: true
  parse_span_html: true
