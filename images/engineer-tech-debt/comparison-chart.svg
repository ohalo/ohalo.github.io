<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4dabf7"/>
      <stop offset="100%" style="stop-color:#339af0"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#fa5252"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#343a40">两年后的差距</text>
  
  <!-- Left side - Address tech debt -->
  <rect x="50" y="60" width="220" height="300" rx="10" fill="white" stroke="#dee2e6" stroke-width="2"/>
  <text x="160" y="90" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#339af0">✅ 定期还债</text>
  <text x="160" y="110" text-anchor="middle" font-family="system-ui" font-size="12" fill="#868e96">Time: 30%</text>
  
  <!-- Bar chart for left side -->
  <rect x="70" y="140" width="180" height="25" rx="4" fill="#e9ecef"/>
  <rect x="70" y="140" width="180" height="25" rx="4" fill="url(#blueGrad)"/>
  <text x="250" y="158" text-anchor="start" font-family="system-ui" font-size="11" fill="#495057">技术能力 ↗</text>
  
  <rect x="70" y="180" width="180" height="25" rx="4" fill="#e9ecef"/>
  <rect x="70" y="180" width="140" height="25" rx="4" fill="url(#blueGrad)"/>
  <text x="250" y="198" text-anchor="start" font-family="system-ui" font-size="11" fill="#495057">薪资 💰</text>
  
  <rect x="70" y="220" width="180" height="25" rx="4" fill="#e9ecef"/>
  <rect x="70" y="220" width="160" height="25" rx="4" fill="url(#blueGrad)"/>
  <text x="250" y="238" text-anchor="start" font-family="system-ui" font-size="11" fill="#495057">工作效率 ⚡</text>
  
  <rect x="70" y="260" width="180" height="25" rx="4" fill="#e9ecef"/>
  <rect x="70" y="260" width="100" height="25" rx="4" fill="url(#blueGrad)"/>
  <text x="250" y="278" text-anchor="start" font-family="system-ui" font-size="11" fill="#495057">压力值 🧘</text>
  
  <rect x="70" y="300" width="180" height="25" rx="4" fill="#e9ecef"/>
  <rect x="70" y="300" width="170" height="25" rx="4" fill="url(#blueGrad)"/>
  <text x="250" y="318" text-anchor="start" font-family="system-ui" font-size="11" fill="#495057">职业选择 🎯</text>
  
  <!-- Right side - Ignore tech debt -->
  <rect x="330" y="60" width="220" height="300" rx="10" fill="white" stroke="#dee2e6" stroke-width="2"/>
  <text x="440" y="90" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#fa5252">❌ 逃避</text>
  <text x="440" y="110" text-anchor="middle" font-family="system-ui" font-size="12" fill="#868e96">Time: 100% 救火</text>
  
  <!-- Bar chart for right side -->
  <rect x="350" y="140" width="180" height="25" rx="4" fill="#e9ecef"/>
  <rect x="350" y="140" width="60" height="25" rx="4" fill="url(#redGrad)"/>
  <text x="530" y="158" text-anchor="start" font-family="system-ui" font-size="11" fill="#495057">技术能力 ↘</text>
  
  <rect x="350" y="180" width="180" height="25" rx="4" fill="#e9ecef"/>
  <rect x="350" y="180" width="100" height="25" rx="4" fill="url(#redGrad)"/>
  <text x="530" y="198" text-anchor="start" font-family="system-ui" font-size="11" fill="#495057">薪资 💸</text>
  
  <rect x="350" y="220" width="180" height="25" rx="4" fill="#e9ecef"/>
  <rect x="350" y="220" width="40" height="25" rx="4" fill="url(#redGrad)"/>
  <text x="530" y="238" text-anchor="start" font-family="system-ui" font-size="11" fill="#495057">效率 ↘↘</text>
  
  <rect x="350" y="260" width="180" height="25" rx="4" fill="#e9ecef"/>
  <rect x="350" y="260" width="175" height="25" rx="4" fill="url(#redGrad)"/>
  <text x="530" y="278" text-anchor="start" font-family="system-ui" font-size="11" fill="#495057">压力 🚨</text>
  
  <rect x="350" y="300" width="180" height="25" rx="4" fill="#e9ecef"/>
  <rect x="350" y="300" width="30" height="25" rx="4" fill="url(#redGrad)"/>
  <text x="530" y="318" text-anchor="start" font-family="system-ui" font-size="11" fill="#495057">选择 🔒</text>
</svg>