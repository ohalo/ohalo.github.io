<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="gradRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a7a3e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a5276;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f0f4f8" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="19" font-weight="800" fill="#1a1a2e">用反脆弱思维重构职业发展</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#666">塔勒布"杠铃策略"在职场中的实际应用</text>

  <!-- ===================== LEFT PANEL: Fragile Career ===================== -->
  <rect x="20" y="68" width="235" height="300" fill="white" rx="10" filter="url(#shadow)"/>
  <rect x="20" y="68" width="235" height="36" fill="url(#gradRed)" rx="10"/>
  <text x="137" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="white">❌ 脆弱职业模式（别这样）</text>

  <!-- Bad pattern 1: Single income -->
  <rect x="35" y="116" width="205" height="46" fill="#fff5f5" rx="6" stroke="#ffcccc" stroke-width="1"/>
  <text x="45" y="134" font-size="11" fill="#c0392b" font-weight="700">1️⃣ 单一收入来源</text>
  <text x="45" y="150" font-size="10" fill="#555">100% 依赖工资，系统崩 = 你崩</text>

  <!-- Bad pattern 2: Single skill -->
  <rect x="35" y="168" width="205" height="46" fill="#fff5f5" rx="6" stroke="#ffcccc" stroke-width="1"/>
  <text x="45" y="186" font-size="11" fill="#c0392b" font-weight="700">2️⃣ 技能极度专一化</text>
  <text x="45" y="202" font-size="10" fill="#555">只在一个系统里有价值，跨行就废</text>

  <!-- Bad pattern 3: No buffer -->
  <rect x="35" y="220" width="205" height="46" fill="#fff5f5" rx="6" stroke="#ffcccc" stroke-width="1"/>
  <text x="45" y="238" font-size="11" fill="#c0392b" font-weight="700">3️⃣ 零"冗余"缓冲</text>
  <text x="45" y="254" font-size="10" fill="#555">没有储蓄、没有备选方案、抗风险能力为零</text>

  <!-- Bad pattern 4: Passive -->
  <rect x="35" y="272" width="205" height="46" fill="#fff5f5" rx="6" stroke="#ffcccc" stroke-width="1"/>
  <text x="45" y="290" font-size="11" fill="#c0392b" font-weight="700">4️⃣ 被动接受安排</text>
  <text x="45" y="306" font-size="10" fill="#555">等通知、等裁员、等公司给答案</text>

  <!-- Warning -->
  <text x="137" y="340" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="700">⚠️ 越努力维护稳定，越脆弱</text>
  <text x="137" y="358" text-anchor="middle" font-size="10" fill="#999">典型：10年大厂经验，被裁后半年找不到工作</text>

  <!-- ===================== MIDDLE: Arrow/Process ===================== -->
  <text x="400" y="150" text-anchor="middle" font-size="28" fill="#555">→</text>
  <text x="400" y="175" text-anchor="middle" font-size="11" fill="#666" font-weight="600">转变</text>
  <text x="400" y="193" text-anchor="middle" font-size="11" fill="#666">反脆弱思维</text>

  <text x="400" y="260" text-anchor="middle" font-size="28" fill="#27ae60">→</text>
  <text x="400" y="285" text-anchor="middle" font-size="11" fill="#666" font-weight="600">杠铃策略</text>
  <text x="400" y="303" text-anchor="middle" font-size="11" fill="#666">90% 安全 + 10% 冒险</text>

  <text x="400" y="365" text-anchor="middle" font-size="28" fill="#27ae60">→</text>
  <text x="400" y="390" text-anchor="middle" font-size="11" fill="#666" font-weight="600">抗风险能力 ↑</text>

  <!-- ===================== RIGHT PANEL: Antifragile Career ===================== -->
  <rect x="545" y="68" width="235" height="300" fill="white" rx="10" filter="url(#shadow)"/>
  <rect x="545" y="68" width="235" height="36" fill="url(#gradGreen)" rx="10"/>
  <text x="662" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="white">✅ 反脆弱职业模式（这样搞）</text>

  <!-- Good pattern 1: Multiple income -->
  <rect x="560" y="116" width="205" height="46" fill="#eafaf1" rx="6" stroke="#a9dfbf" stroke-width="1"/>
  <text x="570" y="134" font-size="11" fill="#1a7a3e" font-weight="700">1️⃣ 收入多元化</text>
  <text x="570" y="150" font-size="10" fill="#555">工资 + 副业 + 投资 + 内容，任一崩了不致命</text>

  <!-- Good pattern 2: Transferable skills -->
  <rect x="560" y="168" width="205" height="46" fill="#eafaf1" rx="6" stroke="#a9dfbf" stroke-width="1"/>
  <text x="570" y="186" font-size="11" fill="#1a7a3e" font-weight="700">2️⃣ 可迁移能力</text>
  <text x="570" y="202" font-size="10" fill="#555">写作/表达/解决问题/连接资源，哪里都值钱</text>

  <!-- Good pattern 3: Barbel strategy -->
  <rect x="560" y="220" width="205" height="46" fill="#eafaf1" rx="6" stroke="#a9dfbf" stroke-width="1"/>
  <text x="570" y="238" font-size="11" fill="#1a7a3e" font-weight="700">3️⃣ 杠铃策略</text>
  <text x="570" y="254" font-size="10" fill="#555">主业稳定 + 副业探索 / 小额高风险试错</text>

  <!-- Good pattern 4: Active -->
  <rect x="560" y="272" width="205" height="46" fill="#eafaf1" rx="6" stroke="#a9dfbf" stroke-width="1"/>
  <text x="570" y="290" font-size="11" fill="#1a7a3e" font-weight="700">4️⃣ 主动制造压力源</text>
  <text x="570" y="306" font-size="10" fill="#555">定期尝试新项目，建立"应变肌肉记忆"</text>

  <!-- Success -->
  <text x="662" y="340" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="700">🌱 不确定性 = 成长燃料</text>
  <text x="662" y="358" text-anchor="middle" font-size="10" fill="#999">系统冲击来了？变强，然后继续</text>

  <!-- Bottom insight -->
  <rect x="20" y="374" width="760" height="26" fill="#fff8e1" rx="6" stroke="#f9ca24" stroke-width="1.5"/>
  <text x="400" y="391" text-anchor="middle" font-size="12" fill="#7d6608" font-weight="700">💡 关键洞察：最危险的职业不是不稳定，而是给你虚假安全感的那个</text>
</svg>
