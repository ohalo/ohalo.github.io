<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#a78bfa" font-size="20" font-weight="700">Skill 训练闭环</text>
  <text x="400" y="62" text-anchor="middle" fill="#6b7280" font-size="12">跑一遍 → 复盘一次 → 让 AI 自动改 → 再跑一遍</text>
  <!-- Cycle arrows (arc from bottom back to top) -->
  <!-- Arrow: right side going up -->
  <path d="M 530 420 Q 620 420 620 300 Q 620 180 620 150" stroke="#4ade80" stroke-width="3" fill="none" stroke-dasharray="8,4" marker-end="url(#arrowGreen)"/>
  <!-- Arrow: left side going down -->
  <path d="M 270 420 Q 180 420 180 300 Q 180 180 180 150" stroke="#4ade80" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4ade80"/>
    </marker>
  </defs>
  <!-- Center: AI brain -->
  <circle cx="400" cy="285" r="55" fill="#1e1e3f" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="600">AI 执行者</text>
  <text x="400" y="288" text-anchor="middle" fill="#6b7280" font-size="11">干活 + 犯错</text>
  <text x="400" y="304" text-anchor="middle" fill="#6b7280" font-size="11">上下文越紧</text>
  <text x="400" y="320" text-anchor="middle" fill="#6b7280" font-size="11">越容易失忆</text>
  <!-- Step boxes -->
  <!-- Box 1: Top -->
  <rect x="285" y="75" width="230" height="58" rx="10" fill="#1e2a1e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">① 执行真实任务</text>
  <text x="400" y="118" text-anchor="middle" fill="#9ca3af" font-size="11">跑3~5次真实场景，观察怎么错</text>
  <!-- Box 2: Right -->
  <rect x="555" y="230" width="200" height="58" rx="10" fill="#1e2a1e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="655" y="255" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="600">② 收集真实翻车</text>
  <text x="655" y="273" text-anchor="middle" fill="#9ca3af" font-size="11">漏了啥？跳了啥？哪错了？</text>
  <!-- Box 3: Bottom-right -->
  <rect x="555" y="340" width="200" height="58" rx="10" fill="#1e2a1e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="655" y="365" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="600">③ AI 参与复盘</text>
  <text x="655" y="383" text-anchor="middle" fill="#9ca3af" font-size="11">错哪了？为什么？怎么改？</text>
  <!-- Box 4: Bottom-left -->
  <rect x="45" y="340" width="200" height="58" rx="10" fill="#1e2a1e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="145" y="365" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="600">④ 自动改 Skill</text>
  <text x="145" y="383" text-anchor="middle" fill="#9ca3af" font-size="11">把错误写成规则，把教训写成 SOP</text>
  <!-- Box 5: Left -->
  <rect x="45" y="230" width="200" height="58" rx="10" fill="#1e2a1e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="145" y="255" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="600">⑤ 验证迭代</text>
  <text x="145" y="273" text-anchor="middle" fill="#9ca3af" font-size="11">再跑一遍，直到效果满意</text>
  <!-- Connecting arrows (simple lines) -->
  <path d="M 400 133 L 400 160" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <path d="M 515 285 L 545 285" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <path d="M 655 288 L 655 332" stroke="#ef4444" stroke-width="2"/>
  <path d="M 245 285 L 215 285" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <!-- Bottom connecting -->
  <path d="M 145 332 L 145 398 L 215 398 L 215 360" stroke="#8b5cf6" stroke-width="2" fill="none"/>
  <path d="M 655 398 L 655 332" stroke="#ef4444" stroke-width="2"/>
  <path d="M 245 398 L 245 360" stroke="#3b82f6" stroke-width="2"/>
  <!-- Right connecting -->
  <path d="M 545 285 L 655 285" stroke="#f59e0b" stroke-width="2"/>
  <path d="M 245 285 L 145 285" stroke="#3b82f6" stroke-width="2"/>
  <!-- Bottom back to step 1 -->
  <path d="M 145 398 L 70 398 L 70 133 L 285 133" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-dasharray="6,3" opacity="0.5"/>
  <path d="M 655 398 L 730 398 L 730 133 L 515 133" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-dasharray="6,3" opacity="0.5"/>
  <!-- Legend -->
  <text x="400" y="475" text-anchor="middle" fill="#6b7280" font-size="11">Skill 不会一次写成 → 从真实翻车里长出来 → 循环迭代，越来越稳定</text>
</svg>
