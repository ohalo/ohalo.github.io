<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)" rx="16"/>
  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700">没有 Skill vs 有 Skill：同一个 AI，两种输出</text>
  <!-- Divider -->
  <line x1="400" y1="55" x2="400" y2="370" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- LEFT: without Skill -->
  <text x="200" y="65" text-anchor="middle" fill="#f87171" font-size="15" font-weight="700">❌ 没有 Skill</text>
  <text x="200" y="83" text-anchor="middle" fill="#6b7280" font-size="11">通用模型，聪明但靠状态</text>
  <!-- Box: Without -->
  <rect x="30" y="98" width="340" height="260" rx="12" fill="#1f1f1f" stroke="#374151" stroke-width="1"/>
  <!-- Issues -->
  <text x="50" y="128" fill="#f87171" font-size="13" font-weight="600">⚠️ 常见失手（按频率排列）</text>
  <line x1="30" y1="138" x2="370" y2="138" stroke="#374151" stroke-width="0.5"/>
  <text x="50" y="160" fill="#fca5a5" font-size="12">① 漏步骤——只做显眼的，忽略隐藏的</text>
  <text x="50" y="183" fill="#fca5a5" font-size="12">② 跳细节——上下文一紧就开始压缩</text>
  <text x="50" y="206" fill="#fca5a5" font-size="12">③ 缺交付物——只交最显眼的那部分</text>
  <text x="50" y="229" fill="#fca5a5" font-size="12">④ 看起来完成了——实际没做全</text>
  <text x="50" y="252" fill="#fca5a5" font-size="12">⑤ 选择"最省事"方案——忽略工程约束</text>
  <text x="50" y="275" fill="#fca5a5" font-size="12">⑥ 这次做得好，下次换一套——不稳定</text>
  <line x1="30" y1="290" x2="370" y2="290" stroke="#374151" stroke-width="0.5"/>
  <text x="50" y="312" fill="#9ca3af" font-size="11">结果：上限高，下限也低</text>
  <text x="50" y="330" fill="#9ca3af" font-size="11">→ 交付质量随心情波动</text>
  <text x="50" y="348" fill="#6b7280" font-size="10">"通用实习生"模式</text>
  <!-- RIGHT: with Skill -->
  <text x="600" y="65" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">✅ 有 Skill</text>
  <text x="600" y="83" text-anchor="middle" fill="#6b7280" font-size="11">业务操作系统，稳定可预期</text>
  <!-- Box: With -->
  <rect x="430" y="98" width="340" height="260" rx="12" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="128" fill="#4ade80" font-size="13" font-weight="600">✓ 有 Skill 的保障</text>
  <line x1="430" y1="138" x2="770" y2="138" stroke="#22c55e" stroke-width="0.5"/>
  <text x="450" y="160" fill="#86efac" font-size="12">① SOP 明写——触发条件+动作+结束门槛</text>
  <text x="450" y="183" fill="#86efac" font-size="12">② 门禁规则——没检查过就不能往下走</text>
  <text x="450" y="206" fill="#86efac" font-size="12">③ Checklist——明确列出要自检的项目</text>
  <text x="450" y="229" fill="#86efac" font-size="12">④ 交付契约——每份文件生成后立刻验证</text>
  <text x="450" y="252" fill="#86efac" font-size="12">⑤ 工程生存指南——明确禁止危险写法</text>
  <text x="450" y="275" fill="#86efac" font-size="12">⑥ 迭代闭环——每次翻车后自动改 Skill</text>
  <line x1="430" y1="290" x2="770" y2="290" stroke="#22c55e" stroke-width="0.5"/>
  <text x="450" y="312" fill="#86efac" font-size="11">结果：稳定交付，过程可审计</text>
  <text x="450" y="330" fill="#86efac" font-size="11">→ 这次+下次+下下次都一样好</text>
  <text x="450" y="348" fill="#22c55e" font-size="10" font-weight="600">"S 级员工"模式</text>
  <!-- Arrow between -->
  <path d="M 375 200 L 420 200" stroke="#fbbf24" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#fbbf24"/>
    </marker>
  </defs>
  <text x="397" y="188" text-anchor="middle" fill="#fbbf24" font-size="10">训练后</text>
</svg>
