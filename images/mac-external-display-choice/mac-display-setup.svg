<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f5f5f7"/>
  
  <!-- MacBook -->
  <rect x="300" y="300" width="200" height="150" rx="10" fill="#c0c0c0"/>
  <rect x="310" y="310" width="180" height="120" rx="5" fill="#111"/>
  <text x="400" y="375" text-anchor="middle" fill="white" font-size="14">MacBook Pro</text>
  
  <!-- Monitor 1 -->
  <rect x="100" y="150" width="200" height="130" rx="10" fill="#333" stroke="#0071e3" stroke-width="2"/>
  <rect x="110" y="160" width="180" height="110" fill="#1a1a1a"/>
  <text x="200" y="220" text-anchor="middle" fill="white" font-size="12">外接显示器</text>
  
  <!-- Monitor 2 (optional) -->
  <rect x="500" y="150" width="200" height="130" rx="10" fill="#333" stroke="#34c759" stroke-width="2"/>
  <rect x="510" y="160" width="180" height="110" fill="#1a1a1a"/>
  <text x="600" y="220" text-anchor="middle" fill="white" font-size="12">可选第二屏</text>
  
  <!-- Connections -->
  <line x1="310" y1="300" x2="290" y2="280" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="490" y1="300" x2="510" y2="280" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Text labels -->
  <text x="200" y="120" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">主显示器 (USB-C/HDMI)</text>
  <text x="600" y="120" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">扩展显示 (可选)</text>
  <text x="400" y="480" text-anchor="middle" fill="#666" font-size="14">MacBook 外接显示器连接示意</text>
  
  <!-- Cable types -->
  <rect x="150" y="250" width="100" height="25" rx="5" fill="#e8e8ed"/>
  <text x="200" y="267" text-anchor="middle" fill="#333" font-size="11">USB-C / Thunderbolt</text>
  
  <rect x="550" y="250" width="80" height="25" rx="5" fill="#e8e8ed"/>
  <text x="590" y="267" text-anchor="middle" fill="#333" font-size="11">HDMI / DP</text>
</svg>