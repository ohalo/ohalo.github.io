<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <text x="400" y="45" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">睡眠质量对比：数字宵禁前后</text>
  
  <!-- Grid lines -->
  <g stroke="#ddd" stroke-width="1">
    <line x1="50" y1="100" x2="750" y2="100"/>
    <line x1="50" y1="150" x2="750" y2="150"/>
    <line x1="50" y1="200" x2="750" y2="200"/>
    <line x1="50" y1="250" x2="750" y2="250"/>
    <line x1="50" y1="300" x2="750" y2="300"/>
    <line x1="50" y1="350" x2="750" y2="350"/>
  </g>
  
  <!-- Before (red) -->
  <rect x="120" y="200" width="100" height="120" fill="#e74c3c" rx="8"/>
  <text x="170" y="340" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" fill="#2c3e50">宵禁前</text>
  
  <!-- After (green) -->
  <rect x="580" y="100" width="100" height="220" fill="#27ae60" rx="8"/>
  <text x="630" y="340" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" fill="#2c3e50">宵禁后</text>
  
  <!-- Legend -->
  <rect x="250" y="30" width="24" height="24" fill="#e74c3c" rx="4"/>
  <text x="285" y="48" font-family="-apple-system, sans-serif" font-size="14" fill="#2c3e50">入睡时间: 1-2小时</text>
  
  <rect x="450" y="30" width="24" height="24" fill="#27ae60" rx="4"/>
  <text x="485" y="48" font-family="-apple-system, sans-serif" font-size="14" fill="#2c3e50">入睡时间: 15分钟</text>
  
  <!-- Arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
  </defs>
  <line x1="280" y1="180" x2="500" y2="180" stroke="#3498db" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="400" y="170" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#3498db">显著改善 ✨</text>
</svg>