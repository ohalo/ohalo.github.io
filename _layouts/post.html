---
layout: default
---
<article>
    <h1>{{ page.title }}</h1>
    
    <div class="meta">{{ page.date | date: "%Y-%m-%d" }} · {% if page.categories %}{{ page.categories | join: " > " }}{% else %}{{ page.category }}{% endif %} · 🔖 {{ page.tags | join: ", " }}</div>
    
    {{ content }}
</article>
