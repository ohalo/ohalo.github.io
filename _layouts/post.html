---
layout: default
---
<article>
    <h1>{{ page.title }}</h1>
    
    <div class="meta">{{ page.date | date: "%Y-%m-%d" }} · {{ page.category_name }} · 🔖 {{ page.tags | join: ", " }}</div>
    
    {{ content }}
    
    <hr>
    
    <p><em>数据来源：{{ page.source | default: "原创" }}</em></p>
</article>
